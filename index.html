<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>한국어 Study — Level 4</title>

  <!-- PWA / mobile -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0F1115" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="한국어" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app"><!-- rendered by app.js --></div>

  <!-- Shown automatically when a new version has been published. -->
  <div id="updateBar" role="status" aria-live="polite">
    <span>🔄 New version available</span>
    <button type="button">Update</button>
  </div>

  <!-- Content (plain globals so the app opens from file:// with no server) -->
  <script src="content/lessons.js"></script>
  <script src="content/curriculum.js"></script>
  <script src="content/podcasts.js"></script>
  <script src="content/firebase-config.js"></script>

  <!-- Modules -->
  <script src="js/storage.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/level.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/practice.js"></script>
  <script src="js/review.js"></script>
  <script src="js/srs.js"></script>
  <script src="js/exam.js"></script>
  <script src="js/glossary.js"></script>
  <script src="js/listening.js"></script>
  <script src="js/app.js"></script>

  <!-- Offline support + "new version available" banner.
       (Only over http/https; a no-op when opened directly as a file://.) -->
  <script>
    (function () {
      if (!('serviceWorker' in navigator) || location.protocol.indexOf('http') !== 0) return;

      function showUpdate(worker) {
        var bar = document.getElementById('updateBar');
        if (!bar) return;
        bar.style.display = 'flex';
        bar.querySelector('button').onclick = function () {
          bar.style.display = 'none';
          if (worker) worker.postMessage({ type: 'SKIP_WAITING' });
        };
      }

      // When the new worker takes control, reload once to show the fresh version.
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });

      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').then(function (reg) {
          if (reg.waiting && navigator.serviceWorker.controller) showUpdate(reg.waiting);
          reg.addEventListener('updatefound', function () {
            var nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', function () {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) showUpdate(nw);
            });
          });
          // Re-check for a new version when the app regains focus, and hourly.
          document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'visible') reg.update().catch(function () {});
          });
          setInterval(function () { reg.update().catch(function () {}); }, 3600000);
        }).catch(function () {});
      });
    })();
  </script>
</body>
</html>
