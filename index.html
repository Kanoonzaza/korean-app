<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>한국어 Study — Level 4</title>

  <!-- PWA / mobile -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0F1115" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="한국어" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app"><!-- rendered by app.js --></div>

  <!-- Content (plain globals so the app opens from file:// with no server) -->
  <script src="content/lessons.js"></script>
  <script src="content/podcasts.js"></script>

  <!-- Modules -->
  <script src="js/storage.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/practice.js"></script>
  <script src="js/review.js"></script>
  <script src="js/listening.js"></script>
  <script src="js/app.js"></script>

  <!-- Offline support (only over http/https; no-op when opened as a file://). -->
  <script>
    if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
